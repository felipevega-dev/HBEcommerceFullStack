name: Next.js CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'harrys-boutique-next/**'
      - '.github/workflows/nextjs-ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'harrys-boutique-next/**'

jobs:
  ci:
    name: Type-check, Lint, Test & Build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: harrys_boutique_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'
          cache: 'npm'
          cache-dependency-path: harrys-boutique-next/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: harrys-boutique-next

      - name: Generate Prisma client
        run: npm run db:generate
        working-directory: harrys-boutique-next
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/harrys_boutique_test

      - name: Run migrations
        run: npm run db:migrate:deploy
        working-directory: harrys-boutique-next
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/harrys_boutique_test

      - name: Type check
        run: npm run type-check
        working-directory: harrys-boutique-next

      - name: Lint
        run: npm run lint
        working-directory: harrys-boutique-next

      - name: Test
        run: npm run test
        working-directory: harrys-boutique-next
        env:
          NODE_ENV: test

      - name: Build
        run: npm run build
        working-directory: harrys-boutique-next
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/harrys_boutique_test
          NEXTAUTH_SECRET: ci-secret-min-32-chars-for-testing-only
          NEXTAUTH_URL: http://localhost:3000
          MERCADOPAGO_ACCESS_TOKEN: ci
          MERCADOPAGO_WEBHOOK_SECRET: ci
          NEXT_PUBLIC_MERCADOPAGO_PUBLIC_KEY: ci
          BLOB_READ_WRITE_TOKEN: ci
          RESEND_API_KEY: ci
          RESEND_FROM_EMAIL: noreply@example.com
          NEXT_PUBLIC_FRONTEND_URL: http://localhost:3000
