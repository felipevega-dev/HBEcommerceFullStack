# Local development — PostgreSQL only.
# The Next.js app runs on the host: npm run dev
#
# Commands:
#   docker compose up -d          Start Postgres
#   docker compose down           Stop Postgres
#   docker compose --profile tools up -d   Include pgAdmin on :5050

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: harrys_boutique
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@harrys.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - '5050:80'
    depends_on:
      - db
    profiles:
      - tools

volumes:
  postgres_data:
    driver: local

networks:
  default:
    name: harrys-network
